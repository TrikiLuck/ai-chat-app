version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ai-chat-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_chat_app}
      MYSQL_USER: ${MYSQL_USER:-aiuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-aipassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-chat-backend
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-aiuser}:${MYSQL_PASSWORD:-aipassword}@mysql:3306/${MYSQL_DATABASE:-ai_chat_app}
      JWT_SECRET: ${JWT_SECRET}
      OMNIROUTE_API_KEY: ${OMNIROUTE_API_KEY}
      OMNIROUTE_ENDPOINT: ${OMNIROUTE_ENDPOINT:-https://api.omniroute.ai}
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: ai-chat-frontend
    ports:
      - "1499:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
