version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-chat-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_chat_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-chat-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_chat_app
      JWT_SECRET: ${JWT_SECRET}
      OMNIROUTE_API_KEY: ${OMNIROUTE_API_KEY}
      OMNIROUTE_ENDPOINT: ${OMNIROUTE_ENDPOINT}
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3001/api
    container_name: ai-chat-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
